@if (toast.show()) {
  <div
    class="fixed bottom-3 left-1/2 -translate-x-1/2 z-[9999]
           px-4 sm:px-5 py-2.5 sm:py-3
           rounded-lg
           bg-black border border-white/10
           text-white text-sm
           shadow-xl
           animate-slideUp
           whitespace-nowrap
           max-w-[90%] sm:max-w-fit
           text-center">

    {{ toast.message() }}

  </div>
}
