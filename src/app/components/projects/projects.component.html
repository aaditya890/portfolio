<section  class="skills-section py-8 md:py-20 text-white">

  <div id="projects" class="max-w-7xl mx-auto px-4 mb-10 md:mb-16">

  <!-- TOP ROW -->
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">

    <!-- LEFT (LABEL) -->
    <div class="flex items-center gap-3">
      <p class="text-green-400 text-sm font-mono">
        // Explore Work
      </p>

      <!-- optional dot -->
      <div class="hidden md:block w-3 h-3 rounded-full bg-green-400"></div>
    </div>

    <!-- RIGHT (TITLE) -->
    <h2 class="text-2xl md:text-5xl font-bold text-white text-left md:text-right leading-tight max-w-xl">
      Showcase of My Projects
    </h2>

  </div>

  <!-- CODE LINE -->
  <div class="flex items-center gap-3 mt-4">

    <span class="text-green-400 font-mono">&lt;/</span>

    <div class="flex-1 h-[1px] bg-gradient-to-r from-green-400/60 via-cyan-400/40 to-transparent"></div>

    <span class="text-green-400 font-mono">&gt;</span>

  </div>

</div>

  <div class="max-w-7xl mx-auto px-4">
<div class="grid md:grid-cols-2 gap-12">

  @for (project of visibleProjects(); track project.title; let i = $index) {

    <div class="project-card group"
         [attr.data-aos]="
           i % 3 === 0 ? 'fade-right' :
           i % 3 === 1 ? 'fade-left' :
           'fade-up'
         "
         [attr.data-aos-delay]="i * 110">

      <div class="relative overflow-hidden rounded-xl group">

  <img [src]="project.image"
     class="w-full h-[220px] md:h-[320px] 
            object-contain md:object-cover 
            project-img bg-black/20" />

  <!-- 🔥 DARK OVERLAY (on hover) -->
  <div class="absolute inset-0 bg-black/40 opacity-0 
              group-hover:opacity-100 transition duration-300">
  </div>

  <!-- 🔥 ARROW BUTTON (BOTTOM RIGHT) -->
  <a [href]="project.url"
     target="_blank"
     class="absolute bottom-4 right-4 z-10
            w-10 h-10 rounded-full
            flex items-center justify-center
            bg-white/10 backdrop-blur-md
            border border-white/20
            text-white text-xl

            opacity-0 translate-y-3
            group-hover:opacity-100 group-hover:translate-y-0
            transition-all duration-300

            hover:bg-white/40">

    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" class="bi bi-arrow-up-right-circle-fill" viewBox="0 0 16 16">
  <path d="M0 8a8 8 0 1 0 16 0A8 8 0 0 0 0 8m5.904 2.803a.5.5 0 1 1-.707-.707L9.293 6H6.525a.5.5 0 1 1 0-1H10.5a.5.5 0 0 1 .5.5v3.975a.5.5 0 0 1-1 0V6.707z"/>
</svg>

  </a>

</div>

      <!-- CONTENT -->
      <div class="mt-5 space-y-3">

        <h3 class="text-xl font-semibold text-white">
          {{ project.title }}
        </h3>

        <p class="text-gray-400 text-sm leading-relaxed">
          {{ project.desc }}
        </p>

        <!-- TAGS -->
        <div class="flex flex-wrap gap-2 mt-3">
          @for (tag of project.tags; track tag) {
            <span class="tag"
                  >
              {{ tag }}
            </span>
          }
        </div>

      </div>

    </div>

  }

</div>

    <!-- BUTTON -->
    <div *ngIf="!showAll()" 
         class="text-center mt-10 relative z-10"
         data-aos="fade-up"
         data-aos-delay="200">

      <button (click)="toggleProjects()" class="show-btn">
        Show More Projects
      </button>

    </div>

  </div>

</section>
